# PREREGISTRATION — committed before any evaluation of this family is run.
# Any change to this file after the first evaluation is a NEW campaign; the
# original declaration stays in git history as the binding record.
campaign_id: seasonal-intl-v1-20260719-001
declared_on: '2026-07-19'
revision_context: ORIGINAL_PREREGISTRATION_NO_EVALUATION_RUN

motivation:
  source_evidence: >
    The US Halloween family (seasonal-study-v1-20260719-001) was the
    program's closest miss: every trial positive net of costs, SPY at HAC
    t=3.73 against the 3.8 bar, family SPA p=0.0024, placebos clean. That
    evaluation is spent. This campaign applies the IDENTICAL frozen rule to
    instruments the US test never touched — the legitimate independent-data
    retest — on the continents where the original literature found the
    effect strongest.
  literature:
    - Bouman, Jacobsen (2002) — the effect in 36 of 37 countries, strongest
      in Europe
    - Jacobsen, Zhang (2018) — 300 years of evidence, out-of-sample updates
  economic_rationale: >
    Vacation-driven seasonal variation in risk appetite is a stronger
    candidate mechanism in Europe (longer summer breaks, thinner August
    liquidity) than in the US where the rule barely missed.

data_contract:
  panel: >
    Sealed via edgestack/data/intl_panel.py (free Stooq→Yahoo chain) to
    artifacts/intl/bars.parquet with a SHA-256 manifest before evaluation.
  watermarks:
    - US_LISTED_WRAPPERS_EMBED_FX_AND_NYSE_LIQUIDITY
    - SURVIVORSHIP_NOT_APPLICABLE_FIXED_ETF_LIST

declared_family:
  # 12 real trials; every one is evaluated, reported, and counted. Placebo
  # controls (SHUFFLED_DATE and MATCHED_RANDOM, two per real trial) extend
  # the accounting family to 36.
  instruments: [EWG, EWU, EWQ, EWP, EWI, EWL, EWD, EWN, FEZ, EWY, EWJ, EWA]
  signals:
    - halloween          # long November through April, cash May through October
  frozen_rule_note: >
    Identical to seasonal-study-v1: decision at each month-end close is
    "is the NEXT month inside November..April"; enter at the final October
    close, exit at the final April close; no other trading.
  direction: LONG_ONLY_VS_CASH
  short_side_excluded_reason: index shorts die to financing and borrow costs
  rebalance: month-end close only (MOC)
  real_trial_count: 12
  placebo_controls_per_trial: 2
  accounting_family_size: 36

execution_contract:
  entry_exit: MOC on the final session of October (enter) and the final
    session of April (exit); decision frozen 15:45 America/New_York
  costs: >
    Full declared cost model per FLIP only (half-spread per fill, base
    slippage, square-root impact at $100k capital, turnover penalty), plus
    the preregistered 0.5x/1x/2x/4x sensitivity ladder. Cash earns zero.

validation_protocol:
  discovery_thresholds: LITERATURE_V2 (directed HAC t >= 3.8, BH q 0.05,
    DSR >= 0.95 at accounting family size 36, Romano-Wolf alpha 0.05,
    White/Hansen family p < 0.05)
  risk_report: Sharpe, max drawdown, terminal wealth vs buy-and-hold SPY
    REPORTED for every trial; context, not gates
  oos: expanding walk-forward (5y min train, 1y test) and CPCV (6 groups,
    2 test, 21 purge/embargo) with PBO < 0.20
  causality: per-survivor truncation invariance and extra-lag checks
  confirmation: independent event-loop replication of every finalist

holdout:
  policy: FORWARD_ONLY
  start: '2026-07-19'
  end: '2028-07-19'
  note: single-use; interim looks forbidden
  evaluator: net mean AND stationary-bootstrap CI lower bound > 0 (CI_V2)

status: DECLARED_AWAITING_IMPLEMENTATION
live_capital: PAPER_ONLY
