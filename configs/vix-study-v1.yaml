# PREREGISTRATION — committed before any evaluation of this family is run.
# Any change to this file after the first evaluation is a NEW campaign; the
# original declaration stays in git history as the binding record.
campaign_id: vix-study-v1-20260717-001
declared_on: '2026-07-17'
revision_context: ORIGINAL_PREREGISTRATION_NO_EVALUATION_RUN

motivation:
  literature:
    - QuantPedia, time-varying equity premia with a high-VIX threshold —
      much higher subsequent returns after VIX exceeds ~its 80th percentile
    - Bekaert & Hoerova (2014) — VIX decomposition and the variance premium
  economic_rationale: >
    Risk-averse deleveraging after volatility spikes leaves a conditional
    risk premium for capital willing to hold equity when VIX is extreme;
    conversely persistent high VIX also marks drawdown regimes, so BOTH
    directions are declared and only the gauntlet decides.

declared_family:
  # 6 real trials; placebos (2 per real) extend the accounting family to 18.
  base_instrument: SPY
  signal: VIXCLS (FRED) percentile against its EXPANDING causal history,
    evaluated at each session close for the next session's exposure
  thresholds: [0.70, 0.80, 0.90]
  responses:
    - RISK_OFF: hold SPY only while the percentile is BELOW the threshold
    - RISK_SEEK: hold SPY only while the percentile is AT/ABOVE the threshold
  direction: LONG_ONLY_VS_CASH
  real_trial_count: 6
  placebo_controls_per_trial: 2
  accounting_family_size: 18

execution_contract:
  entry_exit: MOC on the session after a threshold crossing; costs charged
    per flip with the full declared model and the 0.5x/1x/2x/4x ladder.
    Expected turnover 4-12 flips/year at the 80th percentile.

validation_protocol:
  discovery_thresholds: LITERATURE_V2 (directed HAC t >= 3.8, BH q 0.05,
    DSR >= 0.95 at family size 18, Romano-Wolf alpha 0.05, White/Hansen
    family p < 0.05)
  risk_report: Sharpe, max drawdown, terminal wealth versus buy-and-hold
  oos: expanding walk-forward (5y min train, 1y test) and CPCV (6 groups,
    2 test, 21 purge/embargo) with PBO < 0.20
  causality: per-survivor truncation invariance and extra-lag checks;
    the expanding percentile is causal by construction
  confirmation: independent event-loop replication of every finalist

holdout:
  policy: FORWARD_ONLY
  start: '2026-07-17'
  end: '2028-07-17'
  note: single future evaluation; interim looks forbidden
  evaluator: net mean AND stationary-bootstrap CI lower bound > 0 (CI_V2)

status: DECLARED_AWAITING_IMPLEMENTATION
live_capital: PAPER_ONLY
