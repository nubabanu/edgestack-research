# PREREGISTRATION — committed before any evaluation of this family is run.
# Any change to this file after the first evaluation is a NEW campaign; the
# original declaration stays in git history as the binding record.
campaign_id: preholiday-study-v1-20260719-001
declared_on: '2026-07-19'
revision_context: ORIGINAL_PREREGISTRATION_NO_EVALUATION_RUN

motivation:
  source_evidence: >
    Exchange holidays are published years ahead, making the mask causal by
    construction; roughly nine one-session events per year on the most
    liquid ETFs keeps two-fill turnover survivable, unlike the overnight
    family's per-session churn.
  literature:
    - Lakonishok, Smidt (1988) — ninety years of calendar effects
    - Ariel (1990) — high returns before holidays
    - Chong, Hudson, Keasey, Littler (2005) — post-1990 attenuation
  economic_rationale: >
    Short-covering and mood effects ahead of market closures concentrate
    buying pressure on the final pre-holiday session.

declared_family:
  instruments: [SPY, QQQ, IWM]
  signals:
    - pre_holiday_session   # long ONLY the session immediately before an
                            # exchange holiday (weekday gap in the calendar)
  direction: LONG_ONLY_VS_CASH
  short_side_excluded_reason: index shorts die to financing and borrow costs
  rebalance: buy MOC one session before the pre-holiday session, sell MOC at
    the pre-holiday close; one-session hold, no other trading
  real_trial_count: 3
  placebo_controls_per_trial: 2
  accounting_family_size: 9

execution_contract:
  entry_exit: MOC fills only; decision frozen 15:45 America/New_York; the
    final session of any sample has no observable successor and is never
    classified as pre-holiday
  costs: >
    Full declared cost model per FILL (two fills per event) plus the
    preregistered 0.5x/1x/2x/4x sensitivity ladder. Cash earns zero.

validation_protocol:
  discovery_thresholds: LITERATURE_V2 (directed HAC t >= 3.8, BH q 0.05,
    DSR >= 0.95 at accounting family size 9, Romano-Wolf alpha 0.05,
    White/Hansen family p < 0.05)
  risk_report: Sharpe, max drawdown, terminal wealth vs buy-and-hold REPORTED
  oos: expanding walk-forward (5y min train, 1y test) and CPCV (6 groups,
    2 test, 21 purge/embargo) with PBO < 0.20
  causality: per-survivor truncation invariance and extra-lag checks
  confirmation: independent event-loop replication of every finalist

holdout:
  policy: FORWARD_ONLY
  start: '2026-07-19'
  end: '2028-07-19'
  note: single-use; interim looks forbidden
  evaluator: net mean AND stationary-bootstrap CI lower bound > 0 (CI_V2)

status: DECLARED_AWAITING_IMPLEMENTATION
live_capital: PAPER_ONLY
